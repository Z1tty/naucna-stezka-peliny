<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d6d3e">
  <title>Stanoviště – Naučná stezka Peliny</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/app.js" defer></script>
</head>
<body>

  <div class="topbar">
    <div class="topbar__inner">
      <a class="topbar__back" id="backLink" href="../">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        <span id="backLabel">Stezka</span>
      </a>
      <div class="topbar__progress" aria-hidden="true">
        <span class="topbar__progress-text" id="progText">—</span>
        <div class="topbar__progress-bar"><div class="topbar__progress-fill" id="progFill" style="width:0%"></div></div>
      </div>
      <nav class="lang-switch lang-switch--topbar" id="langSwitch"></nav>
    </div>
  </div>

  <main>
    <article class="station" id="station">
      <p class="loading"><span class="spinner"></span> <span id="loadingText">Načítám…</span></p>
    </article>
  </main>

  <footer class="site-footer" id="footer"></footer>

  <!-- SVG sprite -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <symbol id="icon-sign" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V8"/><rect x="4" y="3" width="16" height="5" rx="1"/><path d="M8 6h.01M12 6h.01M16 6h.01"/><path d="M12 22h5l-2-3 2-3h-5"/></symbol>
      <symbol id="icon-mountain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 7-13 4 7 3-5 6 11H2z"/><circle cx="15.5" cy="4.5" r="1.5" fill="currentColor"/></symbol>
      <symbol id="icon-camel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18c2-3 3-6 5-6s2 2 4 2 2-3 4-3 2 2 4 2"/><path d="M3 18v3"/><path d="M20 18v3"/><circle cx="19" cy="9" r="1.5" fill="currentColor"/><path d="M18 10c-1 1-1 2 0 3"/></symbol>
      <symbol id="icon-mill" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="9" width="10" height="13"/><path d="m5 9 7-6 7 6"/><circle cx="12" cy="16" r="3"/><path d="M12 13v6M9 16h6"/></symbol>
      <symbol id="icon-water" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/><path d="M2 14c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/><path d="M2 20c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/></symbol>
      <symbol id="icon-fossil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12m-6 0a6 6 0 1 1 12 0"/><path d="M12 12m-3 0a3 3 0 1 1 6 0"/><circle cx="12" cy="12" r="1" fill="currentColor"/></symbol>
      <symbol id="icon-flower" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="2.5"/><path d="M12 10.5c-2.5 0-4-2-4-4 0-2 2-3 4-3s4 1 4 3c0 2-1.5 4-4 4z"/><path d="M9.5 10c-2 1.5-4 4-4 6 0 2 2 2.5 3.5 1.5"/><path d="M14.5 10c2 1.5 4 4 4 6 0 2-2 2.5-3.5 1.5"/><path d="M12 11v11"/></symbol>
      <symbol id="icon-mushroom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 1 1 16 0H4z"/><path d="M10 12v8c0 1 1 2 2 2s2-1 2-2v-8"/><circle cx="9" cy="8" r="0.8" fill="currentColor"/><circle cx="14" cy="9" r="0.8" fill="currentColor"/></symbol>
      <symbol id="icon-snail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="13" r="6"/><circle cx="10" cy="13" r="3.5"/><circle cx="10" cy="13" r="1.5"/><path d="M16 13c1 0 2-1 3-2s1-3 1-5"/><circle cx="20" cy="6" r="0.8" fill="currentColor"/><path d="M4 19h14"/></symbol>
      <symbol id="icon-bird" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7c-3 0-6 2-6 6s3 5 3 5-1 3-4 3h10c1 0 3-1 3-3 0-4-3-11-6-11z"/><circle cx="17" cy="8" r="0.7" fill="currentColor"/><path d="M20 9l2-1"/></symbol>
      <symbol id="icon-vista" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="6" r="2"/><path d="M3 18h18"/><path d="m3 18 5-8 4 5 3-3 6 6"/><path d="M3 22h18"/></symbol>
      <symbol id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></symbol>
      <symbol id="icon-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></symbol>
      <symbol id="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></symbol>
    </defs>
  </svg>

  <script>
  window.addEventListener('DOMContentLoaded', async () => {
    const App = window.PelinyApp;
    const lang = App.detectLang();
    document.documentElement.lang = lang;

    App.renderLangSwitch(document.getElementById('langSwitch'), lang, 'topbar');
    App.renderFooter(document.getElementById('footer'), lang);

    // Static UI strings
    document.getElementById('backLabel').textContent = App.t(lang, 'trail');
    document.getElementById('loadingText').textContent = App.t(lang, 'loading');

    const root = document.getElementById('station');
    const progText = document.getElementById('progText');
    const progFill = document.getElementById('progFill');
    const id = new URLSearchParams(location.search).get('id');
    if (!id) {
      root.innerHTML = '<p class="error">' + App.escapeHtml(App.t(lang, 'missingParam')) + '</p>';
      return;
    }

    try {
      const res = await fetch(App.dataFileUrl(lang, '../'), { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const stations = (data.stations || []).sort((a, b) => a.order - b.order);
      const s = stations.find(x => x.id === id);
      if (!s) {
        root.innerHTML = '<p class="error">' + App.escapeHtml(App.t(lang, 'notFound')) + '</p>';
        return;
      }
      document.title = s.title + ' – ' + ((data.meta && data.meta.title) || 'Peliny');

      // Progress
      const total = stations.length;
      progText.textContent = App.t(lang, 'station') + ' ' + s.order + ' / ' + total;
      progFill.style.width = ((s.order / total) * 100) + '%';

      // Visited
      App.markVisited(s.id);

      // Media
      const media = s.image
        ? '<figure class="station__media"><img src="../' + App.escapeHtml(s.image) + '" alt="' + App.escapeHtml(s.title) + '"></figure>'
        : '<figure class="station__media station__media--icon"><svg aria-hidden="true"><use href="#icon-' + App.escapeHtml(s.icon || 'sign') + '"/></svg></figure>';

      const paragraphs = (s.text || []).map(t => '<p>' + App.escapeHtml(t) + '</p>').join('');

      const audioBlock = s.audio ? (
        '<div class="audio" id="audio">' +
          '<button class="audio__btn" id="audioBtn" type="button" aria-label="Play" data-state="paused">' +
            '<svg aria-hidden="true"><use href="#icon-play"/></svg>' +
          '</button>' +
          '<div class="audio__label">' +
            '<div class="audio__title">' + App.escapeHtml(App.t(lang, 'audioGuide')) +
              ' <span class="audio__badge">' + App.escapeHtml(App.t(lang, 'forKids')) + '</span></div>' +
            '<p class="audio__hint" id="audioHint">' + App.escapeHtml(App.t(lang, 'playHint')) + '</p>' +
          '</div>' +
          '<audio id="audioEl" src="../' + App.escapeHtml(s.audio) + '" preload="metadata"></audio>' +
        '</div>'
      ) : '';

      const nextBtn = s.next
        ? '<a class="btn btn--primary" href="?id=' + encodeURIComponent(s.next) + (new URLSearchParams(location.search).get('lang') ? '&lang=' + lang : '') + '">' +
            '<span class="btn__content">' +
              '<span>' + App.escapeHtml(App.t(lang, 'nextStation')) + '</span>' +
              (s.durationToNext ? '<span class="btn__meta">' + App.escapeHtml(s.durationToNext) + '</span>' : '') +
            '</span>' +
            '<svg aria-hidden="true"><use href="#icon-arrow"/></svg>' +
          '</a>'
        : '<a class="btn btn--primary" href="../' + (new URLSearchParams(location.search).get('lang') ? '?lang=' + lang : '') + '"><span>' + App.escapeHtml(App.t(lang, 'backToOverview')) + '</span></a>';

      const mapBtn = s.location
        ? '<a class="btn btn--secondary" target="_blank" rel="noopener"' +
            ' href="https://mapy.cz/zakladni?source=coor&id=' + s.location.lng + ',' + s.location.lat +
              '&x=' + s.location.lng + '&y=' + s.location.lat + '&z=17">' +
            '<svg aria-hidden="true"><use href="#icon-pin"/></svg>' +
            '<span>' + App.escapeHtml(App.t(lang, 'showOnMap')) + '</span>' +
          '</a>'
        : '';

      root.innerHTML =
        '<span class="station__eyebrow">' + s.order + ' / ' + total + ' · ' + App.escapeHtml(s.subtitle || '') + '</span>' +
        '<h1 class="station__title">' + App.escapeHtml(s.title) + '</h1>' +
        media +
        '<div class="station__text">' + paragraphs + '</div>' +
        audioBlock +
        '<div class="actions">' + nextBtn + mapBtn + '</div>';

      // Audio player wiring
      if (s.audio) {
        const btn = document.getElementById('audioBtn');
        const el = document.getElementById('audioEl');
        const hint = document.getElementById('audioHint');

        btn.addEventListener('click', () => {
          if (el.paused) {
            el.play().catch(err => {
              hint.textContent = App.t(lang, 'playFailed');
              console.error(err);
            });
          } else {
            el.pause();
          }
        });

        el.addEventListener('play', () => {
          btn.setAttribute('data-state', 'playing');
          btn.innerHTML = '<svg aria-hidden="true"><use href="#icon-pause"/></svg>';
        });
        el.addEventListener('pause', () => {
          btn.setAttribute('data-state', 'paused');
          btn.innerHTML = '<svg aria-hidden="true"><use href="#icon-play"/></svg>';
        });
        el.addEventListener('timeupdate', () => {
          if (isFinite(el.duration) && el.duration > 0) {
            hint.textContent = fmtTime(el.currentTime) + ' / ' + fmtTime(el.duration);
          }
        });
        el.addEventListener('ended', () => {
          hint.textContent = App.t(lang, 'played');
        });
      }

    } catch (e) {
      root.innerHTML = '<p class="error">' + App.escapeHtml(App.t(lang, 'loadErrorStation')) + '</p>';
      console.error(e);
    }

    function fmtTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ':' + String(s).padStart(2, '0');
    }
  });
  </script>
</body>
</html>
