<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d6d3e">
  <title>Stanoviště – Naučná stezka Peliny</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/app.js" defer></script>
</head>
<body>

  <div class="topbar">
    <div class="topbar__inner">
      <a class="topbar__back" id="backLink" href="../">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        <span id="backLabel">Stezka</span>
      </a>
      <div class="topbar__progress" aria-hidden="true">
        <span class="topbar__progress-text" id="progText">—</span>
        <div class="topbar__progress-bar"><div class="topbar__progress-fill" id="progFill" style="width:0%"></div></div>
      </div>
      <nav class="lang-switch lang-switch--topbar" id="langSwitch"></nav>
    </div>
  </div>

  <main>
    <article class="station" id="station">
      <p class="loading"><span class="spinner"></span> <span id="loadingText">Načítám…</span></p>
    </article>
  </main>

  <button class="fab-scan" id="fabScan" type="button" aria-label="Naskenovat QR">
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"/>
      <rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/>
      <path d="M14 14h3v3h-3zM17 17h4v4h-4zM14 20h3"/>
    </svg>
    <span class="fab-scan__label" id="fabScanLabel">Naskenovat QR</span>
  </button>

  <footer class="site-footer" id="footer"></footer>

  <!-- SVG sprite -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <symbol id="icon-sign" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V8"/><rect x="4" y="3" width="16" height="5" rx="1"/><path d="M8 6h.01M12 6h.01M16 6h.01"/><path d="M12 22h5l-2-3 2-3h-5"/></symbol>
      <symbol id="icon-mountain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 7-13 4 7 3-5 6 11H2z"/><circle cx="15.5" cy="4.5" r="1.5" fill="currentColor"/></symbol>
      <symbol id="icon-camel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18c2-3 3-6 5-6s2 2 4 2 2-3 4-3 2 2 4 2"/><path d="M3 18v3"/><path d="M20 18v3"/><circle cx="19" cy="9" r="1.5" fill="currentColor"/><path d="M18 10c-1 1-1 2 0 3"/></symbol>
      <symbol id="icon-mill" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="9" width="10" height="13"/><path d="m5 9 7-6 7 6"/><circle cx="12" cy="16" r="3"/><path d="M12 13v6M9 16h6"/></symbol>
      <symbol id="icon-water" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/><path d="M2 14c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/><path d="M2 20c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/></symbol>
      <symbol id="icon-fossil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12m-6 0a6 6 0 1 1 12 0"/><path d="M12 12m-3 0a3 3 0 1 1 6 0"/><circle cx="12" cy="12" r="1" fill="currentColor"/></symbol>
      <symbol id="icon-flower" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="2.5"/><path d="M12 10.5c-2.5 0-4-2-4-4 0-2 2-3 4-3s4 1 4 3c0 2-1.5 4-4 4z"/><path d="M9.5 10c-2 1.5-4 4-4 6 0 2 2 2.5 3.5 1.5"/><path d="M14.5 10c2 1.5 4 4 4 6 0 2-2 2.5-3.5 1.5"/><path d="M12 11v11"/></symbol>
      <symbol id="icon-mushroom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 1 1 16 0H4z"/><path d="M10 12v8c0 1 1 2 2 2s2-1 2-2v-8"/><circle cx="9" cy="8" r="0.8" fill="currentColor"/><circle cx="14" cy="9" r="0.8" fill="currentColor"/></symbol>
      <symbol id="icon-snail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="13" r="6"/><circle cx="10" cy="13" r="3.5"/><circle cx="10" cy="13" r="1.5"/><path d="M16 13c1 0 2-1 3-2s1-3 1-5"/><circle cx="20" cy="6" r="0.8" fill="currentColor"/><path d="M4 19h14"/></symbol>
      <symbol id="icon-bird" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7c-3 0-6 2-6 6s3 5 3 5-1 3-4 3h10c1 0 3-1 3-3 0-4-3-11-6-11z"/><circle cx="17" cy="8" r="0.7" fill="currentColor"/><path d="M20 9l2-1"/></symbol>
      <symbol id="icon-vista" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="6" r="2"/><path d="M3 18h18"/><path d="m3 18 5-8 4 5 3-3 6 6"/><path d="M3 22h18"/></symbol>
      <symbol id="icon-key" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="17" r="3.5"/><path d="m9.5 14.5 10-10"/><path d="m14 10 3 3"/><path d="m17 7 2.5 2.5"/></symbol>
      <symbol id="icon-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></symbol>
      <symbol id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></symbol>
      <symbol id="icon-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></symbol>
      <symbol id="icon-route" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="5.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/><path d="M5.5 8v2a3 3 0 0 0 3 3h7a3 3 0 0 1 3 3v2"/></symbol>
      <symbol id="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></symbol>
      <symbol id="icon-sparkle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2 2M16 16l2 2M6 18l2-2M16 8l2-2"/></symbol>
    </defs>
  </svg>

  <script>
  window.addEventListener('DOMContentLoaded', async () => {
    const App = window.PelinyApp;
    const lang = App.detectLang();
    document.documentElement.lang = lang;

    App.renderLangSwitch(document.getElementById('langSwitch'), lang, 'topbar');
    App.renderFooter(document.getElementById('footer'), lang);

    document.getElementById('backLabel').textContent = App.t(lang, 'trail');
    document.getElementById('loadingText').textContent = App.t(lang, 'loading');

    const fab = document.getElementById('fabScan');
    if (fab) {
      fab.setAttribute('aria-label', App.t(lang, 'scanQrBtn'));
      document.getElementById('fabScanLabel').textContent = App.t(lang, 'scanQrBtn');
      fab.addEventListener('click', () => App.openScanner(lang));
    }

    const root = document.getElementById('station');
    const progText = document.getElementById('progText');
    const progFill = document.getElementById('progFill');
    const urlParams = new URLSearchParams(location.search);
    const id = urlParams.get('id');
    const viaQR = urlParams.get('via') === 'qr';
    const langQS = urlParams.get('lang') ? ('&lang=' + lang) : '';
    const langQSp = urlParams.get('lang') ? ('?lang=' + lang) : '';

    if (!id) {
      root.innerHTML = '<p class="error">' + App.escapeHtml(App.t(lang, 'missingParam')) + '</p>';
      return;
    }

    try {
      const res = await fetch(App.dataFileUrl(lang, '../'), { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const allStations = data.stations || [];
      const { main, bonus } = App.splitStations(allStations);
      const stations = [...main, ...bonus];
      const s = stations.find(x => x.id === id);
      if (!s) {
        root.innerHTML = '<p class="error">' + App.escapeHtml(App.t(lang, 'notFound')) + '</p>';
        return;
      }
      document.title = s.title + ' – ' + ((data.meta && data.meta.title) || 'Peliny');

      // Lock gate for bonus
      if (s.bonus) {
        const visitedSet = App.getVisited();
        const mainDone = App.isMainCompleted(allStations, visitedSet);
        if (!mainDone) {
          renderLockedScreen(s, main, visitedSet);
          return;
        }
      }

      // Progress (only main stations count)
      const total = main.length;
      if (s.bonus) {
        progText.textContent = App.t(lang, 'bonusEyebrow');
        progFill.style.width = '100%';
        progFill.style.background = 'var(--amber)';
      } else {
        progText.textContent = App.t(lang, 'station') + ' ' + s.order + ' / ' + total;
        progFill.style.width = ((s.order / total) * 100) + '%';
      }

      // Snapshot visited state BEFORE any marking — used to gate CTAs and notes
      const visitedBefore = App.getVisited();
      const alreadyVisited = visitedBefore.has(s.id);

      // Mark visited ONLY when arriving via QR (or on the bonus — that's already gated)
      let revisitInfo = null;
      if (viaQR) {
        App.markVisited(s.id);
        // Strip via=qr from URL so refresh/share doesn't re-toast
        const clean = new URL(location.href);
        clean.searchParams.delete('via');
        history.replaceState(null, '', clean.toString());

        if (alreadyVisited && !s.bonus) {
          revisitInfo = computeRevisit(s, allStations, visitedBefore);
        } else {
          App.showToast(App.t(lang, 'qrRecorded'));
        }
      }

      // Images: normalize — prefer `images` array, fall back to legacy `image` string
      const galleryImages = (s.images && s.images.length)
        ? s.images
        : (s.image ? [{ src: s.image }] : []);
      const inlineImagesArr = s.inlineImages || [];
      // Combined list for lightbox (gallery first, then inline in order)
      const allImages = galleryImages.concat(inlineImagesArr).map(it => ({
        src: '../' + it.src,
        caption: it.caption || ''
      }));

      // Render top media: icon fallback / single figure / swipeable gallery
      let media;
      if (galleryImages.length === 0) {
        media = '<figure class="station__media station__media--icon"><svg aria-hidden="true"><use href="#icon-' + App.escapeHtml(s.icon || 'sign') + '"/></svg></figure>';
      } else {
        const items = galleryImages.map((img, i) =>
          '<div class="station__gallery-item">' +
            '<img src="../' + App.escapeHtml(img.src) + '" alt="' + App.escapeHtml(img.caption || s.title) + '" data-lb-index="' + i + '" loading="lazy">' +
            (img.caption ? '<div class="station__gallery-caption">' + App.escapeHtml(img.caption) + '</div>' : '') +
          '</div>'
        ).join('');
        const dots = galleryImages.length > 1
          ? '<div class="station__gallery-dots" id="galleryDots">' +
              galleryImages.map((_, i) =>
                '<button class="station__gallery-dot' + (i === 0 ? ' is-active' : '') + '" type="button" data-dot="' + i + '" aria-label="Fotka ' + (i + 1) + '"></button>'
              ).join('') +
            '</div>'
          : '';
        media = '<figure class="station__gallery">' +
                  '<div class="station__gallery-scroll" id="galleryScroll">' + items + '</div>' +
                  dots +
                '</figure>';
      }

      const inlineScanHtml =
        '<div class="inline-scan">' +
          '<button class="btn-inline-scan" type="button" id="inlineScanBtn">' +
            '<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M21 15v4a2 2 0 0 1-2 2h-4M17 3h4v4M3 17v2a2 2 0 0 0 2 2h4M7 3H5a2 2 0 0 0-2 2v2"/>' +
              '<circle cx="12" cy="13" r="3.5"/>' +
              '<path d="M8.5 10V8a1.5 1.5 0 0 1 1.5-1.5h4A1.5 1.5 0 0 1 15.5 8v2"/>' +
            '</svg>' +
            '<span>' + App.escapeHtml(App.t(lang, 'recordVisit')) + '</span>' +
          '</button>' +
        '</div>';

      const paragraphs = (s.text || []).map((txt, i) => {
        const p = '<p>' + App.escapeHtml(txt) + '</p>';
        let extras = '';
        // Insert inline scan CTA after first paragraph (only for non-bonus, and only if not yet recorded)
        if (i === 0 && !s.bonus && !alreadyVisited) extras += inlineScanHtml;
        // Inline images with after === i
        inlineImagesArr.forEach((img, localIdx) => {
          if (img.after === i) {
            const lbIdx = galleryImages.length + localIdx;
            extras += '<figure class="station__inline-fig">' +
              '<img src="../' + App.escapeHtml(img.src) + '" alt="' + App.escapeHtml(img.caption || '') + '" data-lb-index="' + lbIdx + '" loading="lazy">' +
              (img.caption ? '<figcaption>' + App.escapeHtml(img.caption) + '</figcaption>' : '') +
            '</figure>';
          }
        });
        return p + extras;
      }).join('');

      const audioBlock = s.audio ? (
        '<div class="audio" id="audio">' +
          '<button class="audio__btn" id="audioBtn" type="button" aria-label="Play" data-state="paused">' +
            '<svg aria-hidden="true"><use href="#icon-play"/></svg>' +
          '</button>' +
          '<div class="audio__label">' +
            '<div class="audio__title">' + App.escapeHtml(App.t(lang, 'audioGuide')) +
              ' <span class="audio__badge">' + App.escapeHtml(App.t(lang, 'forKids')) + '</span></div>' +
            '<p class="audio__hint" id="audioHint">' + App.escapeHtml(App.t(lang, 'playHint')) + '</p>' +
          '</div>' +
          '<audio id="audioEl" src="../' + App.escapeHtml(s.audio) + '" preload="metadata"></audio>' +
        '</div>'
      ) : '';

      // Note if not via QR (and not yet recorded)
      const qrNote = !viaQR && !s.bonus && !alreadyVisited
        ? '<div class="qr-note qr-note--muted">' + App.escapeHtml(App.t(lang, 'qrNotCountedHint')) + '</div>'
        : '';

      // Next-stop guidance box (only if there IS a next main station)
      let nextGuidance = '';
      if (!s.bonus && s.next) {
        const nextStation = stations.find(x => x.id === s.next);
        const routeUrl = App.buildMapyRouteUrl(s.location, nextStation && nextStation.location);
        const skipHref = 'stanoviste/?id=' + encodeURIComponent(s.next) + langQS.replace('&','?');
        const skipHref2 = '?id=' + encodeURIComponent(s.next) + langQS;

        nextGuidance =
          '<aside class="next-guidance">' +
            '<h3 class="next-guidance__title">' +
              '<svg aria-hidden="true"><use href="#icon-route"/></svg>' +
              App.escapeHtml(App.t(lang, 'nextGuidanceTitle')) +
              (nextStation ? ' — ' + App.escapeHtml(nextStation.title) : '') +
            '</h3>' +
            '<p class="next-guidance__text">' + App.escapeHtml(App.t(lang, 'nextGuidanceText')) + '</p>' +
            '<div class="next-guidance__actions">' +
              (routeUrl
                ? '<a class="btn btn--mapy" href="' + routeUrl + '" target="_blank" rel="noopener">' +
                    '<svg aria-hidden="true"><use href="#icon-route"/></svg>' +
                    '<span>' + App.escapeHtml(App.t(lang, 'navigateInMapy')) + '</span>' +
                    '<img class="btn__mapy-logo" src="../assets/images/mapy-com-logo.svg" alt="Mapy.com" height="16">' +
                  '</a>'
                : '') +
            '</div>' +
            '<a class="next-guidance__skip" href="' + skipHref2 + '">' + App.escapeHtml(App.t(lang, 'skipAhead')) + '</a>' +
          '</aside>';
      } else if (!s.bonus && !s.next) {
        // Last main station — trail finished
        const startLoc = (data.meta && data.meta.startLocation) || null;
        const backRouteUrl = App.buildMapyRouteUrl(s.location, startLoc);
        const visitedSet = App.getVisited();
        const mainDone = App.isMainCompleted(allStations, visitedSet);
        const bonusStop = allStations.find(x => x.bonus);
        const bonusCta = (mainDone && bonusStop)
          ? '<a class="btn btn--mapy" href="?id=' + encodeURIComponent(bonusStop.id) + langQS + '">' +
              '<svg aria-hidden="true"><use href="#icon-key"/></svg>' +
              '<span>' + App.escapeHtml(App.t(lang, 'trailFinishedBonusCta')) + '</span>' +
            '</a>'
          : '';
        const backBtn = backRouteUrl
          ? '<a class="btn btn--mapy" href="' + backRouteUrl + '" target="_blank" rel="noopener">' +
              '<svg aria-hidden="true"><use href="#icon-route"/></svg>' +
              '<span>' + App.escapeHtml(App.t(lang, 'navigateToStart')) + '</span>' +
              '<img class="btn__mapy-logo" src="../assets/images/mapy-com-logo.svg" alt="Mapy.com" height="16">' +
            '</a>'
          : '';
        nextGuidance =
          '<aside class="next-guidance">' +
            '<h3 class="next-guidance__title">' +
              '<svg aria-hidden="true"><use href="#icon-award"/></svg>' +
              App.escapeHtml(App.t(lang, 'trailFinished')) +
            '</h3>' +
            '<p class="next-guidance__text">' + App.escapeHtml(App.t(lang, 'trailFinishedBonusHint')) + '</p>' +
            (bonusCta ? '<div class="next-guidance__actions">' + bonusCta + '</div>' : '') +
            (backBtn ? '<p class="next-guidance__text" style="margin-top:16px">' +
              App.escapeHtml(App.t(lang, 'trailFinishedBackHint')) + '</p>' +
              '<div class="next-guidance__actions">' + backBtn + '</div>' : '') +
          '</aside>';
      }

      const backBtn = '<a class="btn btn--secondary" href="../' + langQSp + '">' +
        '<span>' + App.escapeHtml(App.t(lang, 'backToOverview')) + '</span></a>';

      const eyebrow = s.bonus
        ? App.escapeHtml(App.t(lang, 'bonusEyebrow'))
        : (s.order + ' / ' + total + ' · ' + App.escapeHtml(s.subtitle || ''));

      const revisitBanner = revisitInfo ? renderRevisitBanner(revisitInfo) : '';

      root.innerHTML =
        revisitBanner +
        '<span class="station__eyebrow">' + eyebrow + '</span>' +
        '<h1 class="station__title">' + App.escapeHtml(s.title) + '</h1>' +
        media +
        '<div class="station__text">' + paragraphs + '</div>' +
        audioBlock +
        qrNote +
        nextGuidance +
        '<div class="actions">' + backBtn + '</div>';

      if (s.audio) wireAudio(lang);

      const inlineBtn = document.getElementById('inlineScanBtn');
      if (inlineBtn) inlineBtn.addEventListener('click', () => App.openScanner(lang));

      // Lightbox: click any [data-lb-index] image
      document.querySelectorAll('[data-lb-index]').forEach(el => {
        el.addEventListener('click', () => {
          const i = parseInt(el.getAttribute('data-lb-index'), 10) || 0;
          App.openLightbox(allImages, i);
        });
      });

      // Gallery dots <-> scroll sync
      const scroll = document.getElementById('galleryScroll');
      const dotsEl = document.getElementById('galleryDots');
      if (scroll && dotsEl && galleryImages.length > 1) {
        const dots = [...dotsEl.querySelectorAll('.station__gallery-dot')];
        scroll.addEventListener('scroll', () => {
          const i = Math.round(scroll.scrollLeft / scroll.clientWidth);
          dots.forEach((d, j) => d.classList.toggle('is-active', j === i));
        }, { passive: true });
        dots.forEach((d, i) => {
          d.addEventListener('click', () => {
            scroll.scrollTo({ left: scroll.clientWidth * i, behavior: 'smooth' });
          });
        });
      }

    } catch (e) {
      root.innerHTML = '<p class="error">' + App.escapeHtml(App.t(lang, 'loadErrorStation')) + '</p>';
      console.error(e);
    }

    function computeRevisit(currentStation, allStations, visitedBefore) {
      const { main } = App.splitStations(allStations);
      // Find the next unvisited main station (ordered)
      const nextUnvisited = main.find(x => !visitedBefore.has(x.id));
      return {
        current: currentStation,
        nextUnvisited: nextUnvisited || null,
        allDone: !nextUnvisited
      };
    }

    function renderRevisitBanner(info) {
      const langQS2 = urlParams.get('lang') ? ('?lang=' + lang) : '';
      let body = '';
      let actions = '';
      if (info.allDone) {
        body = App.t(lang, 'revisitAll');
        actions =
          '<a class="btn btn--primary" href="../certifikat/' + langQS2 + '">' +
            '<svg aria-hidden="true"><use href="#icon-award"/></svg>' +
            '<span>' + App.escapeHtml(App.t(lang, 'revisitCertificate')) + '</span>' +
          '</a>';
      } else {
        const next = info.nextUnvisited;
        body = App.t(lang, 'revisitBody', { title: App.escapeHtml(next.title) });
        const routeUrl = App.buildMapyRouteUrl(info.current.location, next.location);
        if (routeUrl) {
          actions =
            '<a class="btn btn--mapy" href="' + routeUrl + '" target="_blank" rel="noopener">' +
              '<svg aria-hidden="true"><use href="#icon-route"/></svg>' +
              '<span>' + App.escapeHtml(App.t(lang, 'revisitNavigate')) + '</span>' +
              '<img class="btn__mapy-logo" src="../assets/images/mapy-com-logo.svg" alt="Mapy.com" height="16">' +
            '</a>';
        }
      }
      return (
        '<aside class="revisit-banner">' +
          '<h3 class="revisit-banner__title">' +
            '<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
              '<circle cx="12" cy="12" r="10"/>' +
              '<path d="m16 8-2 6-6 2 2-6z"/>' +
            '</svg>' +
            App.escapeHtml(App.t(lang, 'revisitTitle')) +
          '</h3>' +
          '<p class="revisit-banner__body">' + body + '</p>' +
          (actions ? '<div class="revisit-banner__actions">' + actions + '</div>' : '') +
        '</aside>'
      );
    }

    function renderLockedScreen(s, mainStations, visited) {
      const visitedCount = mainStations.filter(x => visited.has(x.id)).length;
      progText.textContent = App.t(lang, 'bonusEyebrow');
      progFill.style.width = ((visitedCount / mainStations.length) * 100) + '%';

      root.innerHTML =
        '<div class="locked-screen">' +
          '<div class="locked-screen__icon">' +
            '<svg aria-hidden="true"><use href="#icon-lock"/></svg>' +
          '</div>' +
          '<h1 class="locked-screen__title">' + App.escapeHtml(s.title) + '</h1>' +
          '<p class="locked-screen__text">' + App.escapeHtml(App.t(lang, 'bonusLockedMessage')) + '</p>' +
          '<div class="locked-screen__progress">' +
            App.escapeHtml(App.t(lang, 'bonusLockedProgress')) + ': <b>' + visitedCount + ' / ' + mainStations.length + '</b>' +
          '</div>' +
          '<div class="actions">' +
            '<a class="btn btn--primary" href="../' + langQSp + '">' +
              '<span>' + App.escapeHtml(App.t(lang, 'backToTrail')) + '</span>' +
            '</a>' +
          '</div>' +
        '</div>';
    }

    function wireAudio(lang) {
      const btn = document.getElementById('audioBtn');
      const el = document.getElementById('audioEl');
      const hint = document.getElementById('audioHint');
      if (!btn || !el) return;

      btn.addEventListener('click', () => {
        if (el.paused) {
          el.play().catch(err => { hint.textContent = App.t(lang, 'playFailed'); console.error(err); });
        } else { el.pause(); }
      });
      el.addEventListener('play', () => {
        btn.setAttribute('data-state', 'playing');
        btn.innerHTML = '<svg aria-hidden="true"><use href="#icon-pause"/></svg>';
      });
      el.addEventListener('pause', () => {
        btn.setAttribute('data-state', 'paused');
        btn.innerHTML = '<svg aria-hidden="true"><use href="#icon-play"/></svg>';
      });
      el.addEventListener('timeupdate', () => {
        if (isFinite(el.duration) && el.duration > 0) {
          hint.textContent = fmtTime(el.currentTime) + ' / ' + fmtTime(el.duration);
        }
      });
      el.addEventListener('ended', () => { hint.textContent = App.t(lang, 'played'); });
    }

    function fmtTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ':' + String(s).padStart(2, '0');
    }
  });
  </script>
</body>
