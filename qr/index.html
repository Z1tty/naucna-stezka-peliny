<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1d6d3e">
  <title>…</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="icon" type="image/x-icon" href="../favicon.ico" sizes="any">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Peliny">

  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/app.js" defer></script>
</head>
<body>
  <main>
    <p class="loading" id="msg"><span class="spinner"></span> …</p>
  </main>

  <footer class="site-footer" id="footer"></footer>

  <script>
  window.addEventListener('DOMContentLoaded', async () => {
    const App = window.PelinyApp;
    const lang = App.detectLang();
    document.documentElement.lang = lang;
    App.renderFooter(document.getElementById('footer'), lang);
    document.title = App.t(lang, 'redirecting');

    const msg = document.getElementById('msg');
    msg.innerHTML = '<span class="spinner"></span> ' + App.escapeHtml(App.t(lang, 'redirecting'));

    const code = new URLSearchParams(location.search).get('c');
    if (!code) {
      msg.className = 'error';
      msg.textContent = App.t(lang, 'qrMissing');
      return;
    }
    try {
      const res = await fetch('../data/redirects.json', { cache: 'no-cache' });
      const { redirects } = await res.json();
      const target = redirects[code];
      if (!target) {
        msg.className = 'error';
        msg.innerHTML = App.t(lang, 'qrNotInSystem', { code: App.escapeHtml(code) }) +
          '<br><a href="../?lang=' + lang + '">' + App.escapeHtml(App.t(lang, 'backToOverview')) + '</a>';
        return;
      }
      if (target === '__home__') {
        // Start QR — just open the home page, don't record anything
        location.replace('../?lang=' + lang);
        return;
      }
      // Regular station — include via=qr so station page marks as visited
      location.replace('../stanoviste/?id=' + encodeURIComponent(target) + '&via=qr&lang=' + lang);
    } catch (e) {
      msg.className = 'error';
      msg.textContent = App.t(lang, 'redirectError');
    }
  });
  </script>
</body>
</html>
