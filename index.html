<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d6d3e">
  <meta name="description" content="Naučná stezka Peliny — přírodní rezervace nad Tichou Orlicí v Chocni. Deset zastavení s audio průvodcem.">
  <title>Naučná stezka Peliny</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/app.js" defer></script>
</head>
<body>

  <header class="hero" id="hero">
    <img class="hero__image" id="heroImage" alt="" aria-hidden="true">
    <div class="hero__overlay"></div>
    <nav class="lang-switch lang-switch--hero" id="langSwitch"></nav>
    <div class="hero__content">
      <span class="hero__eyebrow" id="heroEyebrow">Peliny</span>
      <h1 class="hero__title" id="heroTitle">…</h1>
      <p class="hero__subtitle" id="heroSubtitle"></p>
    </div>
  </header>

  <main>
    <p class="intro" id="intro"></p>

    <ul class="stats" id="stats"></ul>

    <div class="progress-banner" id="progressBanner" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
      <span><span id="visitedLabel">Navštíveno</span>: <span class="progress-banner__count" id="progressCount">0</span> <span id="progressOf">z</span> <span id="progressTotal">10</span></span>
      <button class="progress-banner__reset" id="progressReset" type="button">Vynulovat</button>
    </div>

    <h2 class="section-heading" id="sectionHeading">Zastavení</h2>

    <ul class="stations" id="stations">
      <li class="loading"><span class="spinner"></span> <span id="loadingText">Načítám…</span></li>
    </ul>
  </main>

  <footer class="site-footer" id="footer"></footer>

  <!-- Inline SVG icon library -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <symbol id="icon-sign" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V8"/><rect x="4" y="3" width="16" height="5" rx="1"/><path d="M8 6h.01M12 6h.01M16 6h.01"/><path d="M12 22h5l-2-3 2-3h-5"/></symbol>
      <symbol id="icon-mountain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 7-13 4 7 3-5 6 11H2z"/><circle cx="15.5" cy="4.5" r="1.5" fill="currentColor"/></symbol>
      <symbol id="icon-camel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18c2-3 3-6 5-6s2 2 4 2 2-3 4-3 2 2 4 2"/><path d="M3 18v3"/><path d="M20 18v3"/><circle cx="19" cy="9" r="1.5" fill="currentColor"/><path d="M18 10c-1 1-1 2 0 3"/></symbol>
      <symbol id="icon-mill" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="9" width="10" height="13"/><path d="m5 9 7-6 7 6"/><circle cx="12" cy="16" r="3"/><path d="M12 13v6M9 16h6"/></symbol>
      <symbol id="icon-water" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/><path d="M2 14c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/><path d="M2 20c2 0 3-2 5-2s3 2 5 2 3-2 5-2 3 2 5 2"/></symbol>
      <symbol id="icon-fossil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12m-6 0a6 6 0 1 1 12 0"/><path d="M12 12m-3 0a3 3 0 1 1 6 0"/><circle cx="12" cy="12" r="1" fill="currentColor"/></symbol>
      <symbol id="icon-flower" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="2.5"/><path d="M12 10.5c-2.5 0-4-2-4-4 0-2 2-3 4-3s4 1 4 3c0 2-1.5 4-4 4z"/><path d="M9.5 10c-2 1.5-4 4-4 6 0 2 2 2.5 3.5 1.5"/><path d="M14.5 10c2 1.5 4 4 4 6 0 2-2 2.5-3.5 1.5"/><path d="M12 11v11"/></symbol>
      <symbol id="icon-mushroom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 1 1 16 0H4z"/><path d="M10 12v8c0 1 1 2 2 2s2-1 2-2v-8"/><circle cx="9" cy="8" r="0.8" fill="currentColor"/><circle cx="14" cy="9" r="0.8" fill="currentColor"/></symbol>
      <symbol id="icon-snail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="13" r="6"/><circle cx="10" cy="13" r="3.5"/><circle cx="10" cy="13" r="1.5"/><path d="M16 13c1 0 2-1 3-2s1-3 1-5"/><circle cx="20" cy="6" r="0.8" fill="currentColor"/><path d="M4 19h14"/></symbol>
      <symbol id="icon-bird" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 7c-3 0-6 2-6 6s3 5 3 5-1 3-4 3h10c1 0 3-1 3-3 0-4-3-11-6-11z"/><circle cx="17" cy="8" r="0.7" fill="currentColor"/><path d="M20 9l2-1"/></symbol>
      <symbol id="icon-vista" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="6" r="2"/><path d="M3 18h18"/><path d="m3 18 5-8 4 5 3-3 6 6"/><path d="M3 22h18"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></symbol>
      <symbol id="icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></symbol>
    </defs>
  </svg>

  <script>
  window.addEventListener('DOMContentLoaded', async () => {
    const App = window.PelinyApp;
    const lang = App.detectLang();
    document.documentElement.lang = lang;

    App.renderLangSwitch(document.getElementById('langSwitch'), lang, 'hero');
    App.renderFooter(document.getElementById('footer'), lang);

    // Static UI strings
    document.getElementById('loadingText').textContent = App.t(lang, 'loading');
    document.getElementById('sectionHeading').textContent = App.t(lang, 'stationsHeading');
    document.getElementById('visitedLabel').textContent = App.t(lang, 'visitedLabel');
    document.getElementById('progressOf').textContent = App.t(lang, 'of');
    document.getElementById('progressReset').textContent = App.t(lang, 'resetBtn');

    const list = document.getElementById('stations');
    const hero = document.getElementById('hero');
    const heroImage = document.getElementById('heroImage');
    const heroEyebrow = document.getElementById('heroEyebrow');
    const heroTitle = document.getElementById('heroTitle');
    const heroSubtitle = document.getElementById('heroSubtitle');
    const intro = document.getElementById('intro');
    const stats = document.getElementById('stats');
    const banner = document.getElementById('progressBanner');
    const bannerCount = document.getElementById('progressCount');
    const bannerTotal = document.getElementById('progressTotal');
    const reset = document.getElementById('progressReset');

    try {
      const res = await fetch(App.dataFileUrl(lang), { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const meta = data.meta || {};
      const stations = (data.stations || []).sort((a, b) => a.order - b.order);

      document.title = meta.title || 'Peliny';
      heroEyebrow.textContent = lang === 'cs' ? 'Naučná stezka' : 'Nature trail';
      heroTitle.textContent = meta.title || '';
      heroSubtitle.textContent = meta.subtitle || '';
      if (meta.heroImage) {
        heroImage.src = meta.heroImage;
      } else {
        hero.style.display = 'none';
      }
      intro.textContent = meta.intro || '';

      // Stats
      stats.innerHTML = '';
      (meta.stats || []).forEach(s => {
        const li = document.createElement('li');
        li.innerHTML = '<span class="stats__value">' + App.escapeHtml(s.value) + '</span>' +
                       '<span class="stats__label">' + App.escapeHtml(s.label) + '</span>';
        stats.appendChild(li);
      });

      // Visited state
      const visited = App.getVisited();
      bannerTotal.textContent = stations.length;
      const n = stations.filter(s => visited.has(s.id)).length;
      bannerCount.textContent = n;
      if (n > 0) banner.hidden = false;

      // Render stations
      list.innerHTML = '';
      stations.forEach(s => {
        const li = document.createElement('li');
        const isVisited = visited.has(s.id);
        const num = isVisited
          ? '<span class="station-link__num"><svg aria-hidden="true"><use href="#icon-check"/></svg></span>'
          : '<span class="station-link__num">' + s.order + '</span>';
        const thumb = s.image
          ? '<div class="station-link__thumb"><img src="' + App.escapeHtml(s.image) + '" alt="" loading="lazy">' + num + '</div>'
          : '<div class="station-link__thumb station-link__thumb--icon"><svg aria-hidden="true"><use href="#icon-' + App.escapeHtml(s.icon || 'sign') + '"/></svg>' + num + '</div>';

        li.innerHTML =
          '<a class="station-link' + (isVisited ? ' is-visited' : '') + '" href="stanoviste/?id=' + encodeURIComponent(s.id) + '">' +
            thumb +
            '<div class="station-link__body">' +
              '<h3 class="station-link__title">' + App.escapeHtml(s.title) + '</h3>' +
              '<p class="station-link__subtitle">' + App.escapeHtml(s.subtitle || '') + '</p>' +
            '</div>' +
            '<span class="station-link__arrow" aria-hidden="true"><svg><use href="#icon-arrow"/></svg></span>' +
          '</a>';
        list.appendChild(li);
      });

      reset.addEventListener('click', () => {
        if (confirm(App.t(lang, 'resetConfirm'))) {
          App.clearVisited();
          location.reload();
        }
      });
    } catch (e) {
      list.innerHTML = '<li class="error">' + App.escapeHtml(App.t(lang, 'loadError')) + '</li>';
      console.error(e);
    }
  });
  </script>
</body>
</html>
